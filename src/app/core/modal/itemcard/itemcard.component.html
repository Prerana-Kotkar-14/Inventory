<div class="p-4 border rounded-lg shadow bg-white">
    <h2 class="text-xl font-semibold">{{item.itemName}}</h2>

    <p class="text-gray-600">{{item.description}}</p>

    <div class="mt-2">
        <p>Category : {{ item.category}}</p>
        <p>Price : ${{item.price}}</p>
        <p>Supplier : {{item.supplierName}}</p>
    </div>

    <p class="text-xs text-gray-400 mt-2">
        Updated: {{item.updatedAt}}
    </p>

    <div class="flex justify-between mt-2">
        <!-- Edit button -->
         <button 
         class="px-2 py-1 rounded-lg bg-blue-200 text-white  hover:bg-blue-700 transition">
          Edit
        </button>

         <!-- Delete button -->
          <button
          class="px-2 py-1 rounded-lg bg-blue-200 text-white text-sm hover:bg-blue-700 transition">
          Delete
        </button>
    </div>
</div>
