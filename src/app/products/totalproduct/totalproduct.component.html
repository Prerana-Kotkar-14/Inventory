
<div class="w-full flex justify-between items-center my-6 pr-20">
    <h1 class="text-2xl font-bold text-blue-900">Total Product</h1>

    <!-- Right Action Button -->
     <button 
     class="border border-blue-900 test-blue-890 bg-white px-4 py-2 rounded-md font-medium hover:bg-blue-50 transition"
     (click)="openAddModal()"
     >
     Add Item
    </button>
</div>

<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
    @for(item of items(); track item.id)
    {
        <app-itemcard 
        [item]="item"
        (editRequested)="openEditModal($event)"
        ></app-itemcard>
    }
</div>

@if(isAnyModalOpen())
{
    <app-add-edit-modal
        [mode]="modalMode()"
        [itemData]="selectedItem()"
        [suppliers]="suppliers()"
        [category]="categories()"
        (save)="saveItem($event)"
        (cancel)="closeModal()"
    ></app-add-edit-modal>
}

<!-- sticky bottom nav bar -->

@if(!isAnyModalOpen()){
    <div class="sticky bottom-0 left-0 w-full bg-white border-t p-4 justify-start z-50">
        <button (click)="goBack()" class="px-4 py-2 text-blue-400 hover:text-blue-600">Cancel</button>
    </div>
}
